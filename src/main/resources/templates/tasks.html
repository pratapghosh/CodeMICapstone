<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Tasks | Todo App</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="dashboard">
    <header class="dashboard-header">
        <div>
            <h1>Todo Dashboard</h1>
            <p class="subtitle">User: <strong th:text="${username}"></strong></p>
        </div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn secondary">Logout</button>
        </form>
    </header>

    <section class="card">
        <h2>Create New Task</h2>

        <div th:if="${#fields.hasGlobalErrors()}" class="alert error" th:each="error : ${#fields.globalErrors()}"
             th:text="${error}"></div>

        <form th:action="@{/tasks}" th:object="${taskForm}" method="post" class="form-grid">
            <label for="title">Task Title</label>
            <input id="title" type="text" th:field="*{title}" required>
            <p class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>

            <label for="description">Description</label>
            <textarea id="description" th:field="*{description}" rows="3"></textarea>
            <p class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></p>

            <div class="date-grid">
                <div>
                    <label for="taskDate">Task Date</label>
                    <input id="taskDate" type="date" th:field="*{taskDate}" required>
                    <p class="field-error" th:if="${#fields.hasErrors('taskDate')}" th:errors="*{taskDate}"></p>
                </div>
                <div>
                    <label for="plannedFinishDate">Planned Finish Date</label>
                    <input id="plannedFinishDate" type="date" th:field="*{plannedFinishDate}" required>
                    <p class="field-error" th:if="${#fields.hasErrors('plannedFinishDate')}"
                       th:errors="*{plannedFinishDate}"></p>
                </div>
            </div>

            <label for="priority">Priority</label>
            <select id="priority" th:field="*{priority}" required>
                <option value="HIGH">HIGH</option>
                <option value="MEDIUM">MEDIUM</option>
                <option value="LOW">LOW</option>
            </select>
            <p class="field-error" th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}"></p>

            <button type="submit" class="btn">Add Task</button>
        </form>
    </section>

    <section class="card">
        <div class="section-header">
            <h2>My Task List</h2>
            <a th:if="${hasActiveFilters}" th:href="@{/tasks}" class="clear-link">Clear filters</a>
        </div>

        <form th:action="@{/tasks}" method="get" class="filter-bar">
            <div class="filter-field search-field">
                <label for="q">Search</label>
                <input id="q" name="q" type="search" placeholder="Title or description" th:value="${query.q}">
            </div>

            <div class="filter-field">
                <label for="status-filter">Status</label>
                <select id="status-filter" name="status">
                    <option th:each="statusFilter : ${statusFilters}"
                            th:value="${statusFilter}"
                            th:selected="${statusFilter == query.status}"
                            th:text="${statusFilter}"></option>
                </select>
            </div>

            <div class="filter-field">
                <label for="priority-filter">Priority</label>
                <select id="priority-filter" name="priority">
                    <option th:each="priorityFilter : ${priorityFilters}"
                            th:value="${priorityFilter}"
                            th:selected="${priorityFilter == query.priority}"
                            th:text="${priorityFilter}"></option>
                </select>
            </div>

            <div class="filter-field">
                <label for="date-filter">Date</label>
                <select id="date-filter" name="dateFilter">
                    <option th:each="dateFilterOption : ${dateFilters}"
                            th:value="${dateFilterOption}"
                            th:selected="${dateFilterOption == query.dateFilter}"
                            th:text="${dateFilterOption}"></option>
                </select>
            </div>

            <div class="filter-field">
                <label for="sort-filter">Sort</label>
                <select id="sort-filter" name="sort">
                    <option th:each="sortOption : ${sortOptions}"
                            th:value="${sortOption}"
                            th:selected="${sortOption == query.sort}"
                            th:text="${sortOption == T(com.capstone.todo.service.TaskDashboardQuery.SortOption).PLANNED_FINISH_ASC ? 'PLANNED FINISH ASC' : sortOption}"></option>
                </select>
            </div>

            <div class="filter-actions">
                <button type="submit" class="btn">Apply</button>
            </div>
        </form>

        <div th:if="${#lists.isEmpty(taskDisplays)}" class="empty-state"
             th:text="${hasActiveFilters} ? 'No tasks match the selected search or filters.' : 'No tasks yet. Add your first task above.'">
            No tasks yet. Add your first task above.
        </div>

        <div class="task-list" th:if="${!#lists.isEmpty(taskDisplays)}">
            <article class="task-item" th:each="display : ${taskDisplays}" th:classappend="${display.overdue} ? ' overdue-task' : ''">
                <div class="task-main">
                    <div class="task-title-row">
                        <h3 th:text="${display.task.title}"></h3>
                        <span th:if="${display.overdue}" class="overdue-badge">Overdue</span>
                    </div>
                    <p class="task-description" th:text="${display.task.description}"></p>
                    <p class="task-dates">
                        Task Date: <strong th:text="${display.task.taskDate}"></strong>
                        | Planned Finish: <strong th:text="${display.task.plannedFinishDate}"></strong>
                        | Priority: <strong th:text="${display.task.priority}"></strong>
                    </p>
                    <p class="status" th:classappend="${display.task.status.name() == 'COMPLETED'} ? 'completed' : 'open'"
                       th:text="${display.task.status}"></p>
                </div>

                <a th:if="${display.task.status.name() == 'OPEN'}"
                   th:href="@{|/tasks/${display.task.id}/edit?q=${query.q}&status=${query.status}&priority=${query.priority}&dateFilter=${query.dateFilter}&sort=${query.sort}|}"
                   class="btn secondary">Edit</a>
                <form th:if="${display.task.status.name() == 'OPEN'}" th:action="@{|/tasks/${display.task.id}/complete|}" method="post">
                    <button type="submit" class="btn success">Mark Completed</button>
                </form>
            </article>
        </div>
    </section>

    <section class="card" th:if="${editingTaskId != null}" th:object="${editTaskForm}">
        <h2>Edit Task</h2>

        <div th:if="${#fields.hasGlobalErrors()}" class="alert error" th:each="error : ${#fields.globalErrors()}"
             th:text="${error}"></div>

        <form th:action="@{|/tasks/${editingTaskId}/edit|}" method="post" class="form-grid">
            <label for="edit-title">Task Title</label>
            <input id="edit-title" type="text" th:field="*{title}" required>
            <p class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>

            <label for="edit-description">Description</label>
            <textarea id="edit-description" th:field="*{description}" rows="3"></textarea>
            <p class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></p>

            <div class="date-grid">
                <div>
                    <label for="edit-taskDate">Task Date</label>
                    <input id="edit-taskDate" type="date" th:field="*{taskDate}" required>
                    <p class="field-error" th:if="${#fields.hasErrors('taskDate')}" th:errors="*{taskDate}"></p>
                </div>
                <div>
                    <label for="edit-plannedFinishDate">Planned Finish Date</label>
                    <input id="edit-plannedFinishDate" type="date" th:field="*{plannedFinishDate}" required>
                    <p class="field-error" th:if="${#fields.hasErrors('plannedFinishDate')}"
                       th:errors="*{plannedFinishDate}"></p>
                </div>
            </div>

            <label for="edit-priority">Priority</label>
            <select id="edit-priority" th:field="*{priority}" required>
                <option value="HIGH">HIGH</option>
                <option value="MEDIUM">MEDIUM</option>
                <option value="LOW">LOW</option>
            </select>
            <p class="field-error" th:if="${#fields.hasErrors('priority')}" th:errors="*{priority}"></p>

            <button type="submit" class="btn">Save Changes</button>
            <a th:href="@{/tasks}" class="btn secondary">Cancel</a>
        </form>
    </section>
</div>
</body>
</html>
