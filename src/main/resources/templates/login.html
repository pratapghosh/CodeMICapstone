<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Todo App</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="auth-container">
    <div class="card auth-card">
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to manage your personal tasks.</p>

        <div th:if="${param.error}" class="alert error">Invalid username or password.</div>
        <div th:if="${param.logout}" class="alert success">You have been logged out.</div>
        <div th:if="${param.registered}" class="alert success">Registration successful. Please sign in.</div>

        <form th:action="@{/login}" method="post" class="form-grid">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" autocomplete="username" required>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>

            <button type="submit" class="btn">Sign In</button>
        </form>

        <p class="footer-link">New user? <a th:href="@{/register}">Create an account</a></p>
    </div>
</div>
</body>
</html>
